name: build-apk

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brain-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mawa-brain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mawa-brain/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_B64" ]; then
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/mawa-signing.p12"
            echo "Signing keystore decoded"
          else
            echo "::warning::SIGNING_KEYSTORE_B64 secret not set — APK gets a throwaway key; self-update will NOT work"
          fi

      - name: Fetch face recognition model (best-effort, size-guarded)
        run: |
          MODEL="mawa-face/app/src/main/assets/mobilefacenet.tflite"
          mkdir -p "$(dirname "$MODEL")"
          curl -fsSL -o "$MODEL" \
            "https://github.com/MCarlomagno/FaceRecognitionAuth/raw/master/assets/mobilefacenet.tflite" || true
          if [ -f "$MODEL" ]; then
            SIZE=$(wc -c < "$MODEL")
            echo "face model size: $SIZE bytes"
            # A real MobileFaceNet is ~5MB; anything tiny is a 404/LFS pointer.
            if [ "$SIZE" -lt 1000000 ]; then
              echo "::warning::face model download looks bad ($SIZE B) — removing so recognition stays dormant"
              rm -f "$MODEL"
            else
              echo "face recognition will be ACTIVE in this build"
            fi
          else
            echo "::warning::no face model fetched — recognition stays dormant"
          fi

      - name: Build debug APK
        working-directory: mawa-face
        env:
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/mawa-signing.p12
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: mawa-face-debug
          path: mawa-face/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK + version to rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp mawa-face/app/build/outputs/apk/debug/app-debug.apk mawa-face.apk
          echo "${{ github.run_number }}" > version.txt
          gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create latest --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "Latest debug build" \
              --notes "Rolling debug APK — download this on the phone and sideload."
          gh release upload latest mawa-face.apk version.txt --repo "$GITHUB_REPOSITORY" --clobber
